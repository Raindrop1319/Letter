<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>致你的一封信</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <main class="envelope-stage" id="stage">
    <section class="envelope" id="envelope" role="button" tabindex="0" aria-label="点击打开信封">
      <div class="envelope-back"></div>
      <div class="envelope-letter-peek"></div>
      <div class="envelope-front"></div>
      <div class="envelope-flap"></div>
      <div class="envelope-seal" aria-hidden="true">
        <img src="images/seal-dog.png" alt="" draggable="false" />
      </div>
      <p class="envelope-hint">点此 · 启封</p>
    </section>

    <article class="letter" id="letter" aria-hidden="true">
      <header class="letter-header">
        <h1 class="letter-title" id="letterTitle">My Dearest</h1>
        <p class="letter-subtitle" id="letterSubtitle">A LETTER FOR YOU</p>
      </header>

      <div class="letter-body" id="letterBody">
        <p class="loading">正在展开信纸…</p>
      </div>

      <footer class="letter-footer">
        <p class="signature" id="letterSignature">— Yours,</p>
        <button class="close-btn" id="closeBtn" type="button">收起</button>
      </footer>
    </article>
  </main>

  <script src="script.js"></script>
</body>
</html>
